name: AI QA Agent Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:
    inputs:
      protocol:
        description: 'Protocol (rest or graphql)'
        required: false
        default: 'rest'
      spec_url:
        description: 'OpenAPI spec URL or GraphQL endpoint'  
        required: false
        default: ''
      api_base_url:
        description: 'Base URL for API (overrides default)'
        required: false
        default: ''

# Разрешения для деплоя на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Обеспечиваем последовательный деплой
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PROTOCOL: ${{ github.event.inputs.protocol || 'rest' }}
  OPENAPI_SPEC_URL: ${{ github.event.inputs.spec_url || 'examples/openapi.json' }}
  API_BASE_URL: ${{ github.event.inputs.api_base_url || secrets.API_BASE_URL || 'https://api.example.com/' }}
  REPORTS_DIR: reports
  TESTS_DIR: generated_tests
  ALLURE_VERSION: 2.33.0

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI QA Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAPI_SPEC_URL: ${{ env.OPENAPI_SPEC_URL }}
          API_BASE_URL: ${{ env.API_BASE_URL }}
        run: |
          python -m src.main --protocol "$PROTOCOL" --spec "$OPENAPI_SPEC_URL" --base-url "$API_BASE_URL"

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/${{ env.ALLURE_VERSION }}/allure-${{ env.ALLURE_VERSION }}.tgz
          tar -xzf allure-${{ env.ALLURE_VERSION }}.tgz
          echo "$(pwd)/allure-${{ env.ALLURE_VERSION }}/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate ${{ env.REPORTS_DIR }} -o allure-report --clean
        continue-on-error: true

      - name: Upload Allure Report as Artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14

      - name: Upload Test Results (raw) as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ${{ env.REPORTS_DIR }}
            ${{ env.TESTS_DIR }}
          retention-days: 14

      # Шаги для публикации на GitHub Pages (только для ветки master)
      - name: Upload Allure Report as Pages Artifact
        if: github.ref == 'refs/heads/master' && always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' && always()
        uses: actions/deploy-pages@v4

      - name: Display test summary
        if: always()
        run: |
          echo "Pipeline finished. Check artifacts for Allure report and test results."
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "Allure report will be available at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi