name: AI QA Agent with OpenClaw

on:
  workflow_dispatch:
    inputs:
      protocol:
        description: 'Protocol (rest, graphql, grpc)'
        required: false
        default: 'rest'
      spec_url:
        description: 'OpenAPI spec URL or GraphQL endpoint (ignored for gRPC)'
        required: false
        default: ''
      api_base_url:
        description: 'Base URL for API (REST/GraphQL) or server address (gRPC: host:port)'
        required: false
        default: ''
      orchestrator:
        description: 'Orchestrator (openclaw, legacy)'
        required: false
        default: 'openclaw'
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PROTOCOL: ${{ github.event.inputs.protocol || 'rest' }}
  SPEC_URL: ${{ github.event.inputs.spec_url || 'examples/openapi.json' }}
  API_BASE_URL: ${{ github.event.inputs.api_base_url || secrets.API_BASE_URL || '' }}
  ORCHESTRATOR: ${{ github.event.inputs.orchestrator || 'openclaw' }}
  DEBUG: ${{ github.event.inputs.debug || 'false' }}
  LOG_LEVEL: ${{ github.event.inputs.debug == 'true' && 'DEBUG' || 'INFO' }}
  REPORTS_DIR: reports
  TESTS_DIR: generated_tests
  ALLURE_VERSION: 2.33.0

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Display environment info
        run: |
          echo "=== Environment Info ==="
          python --version
          pip --version
          echo "Protocol: ${{ env.PROTOCOL }}"
          echo "Orchestrator: ${{ env.ORCHESTRATOR }}"
          echo "Log Level: ${{ env.LOG_LEVEL }}"
          echo "========================="

      # Install grpcurl only for gRPC protocol
      - name: Install grpcurl
        if: env.PROTOCOL == 'grpc'
        run: |
          set -e
          curl -L -o grpcurl.tar.gz https://github.com/fullstorydev/grpcurl/releases/download/v1.9.2/grpcurl_1.9.2_linux_amd64.tar.gz || true
          if file grpcurl.tar.gz | grep -q 'gzip compressed data'; then
            tar -xzf grpcurl.tar.gz
            sudo mv grpcurl /usr/local/bin/
          else
            echo "Binary download failed, falling back to go install"
            sudo apt-get update && sudo apt-get install -y golang-go
            go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest
            echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          fi

      # Set spec argument based on protocol
      - name: Set spec argument
        id: spec_arg
        run: |
          if [ "${{ env.PROTOCOL }}" = "grpc" ]; then
            echo "SPEC_ARG=" >> $GITHUB_OUTPUT
          else
            echo "SPEC_ARG=${{ env.SPEC_URL }}" >> $GITHUB_OUTPUT
          fi

      # Run OpenClaw orchestrator integration tests
      - name: Run OpenClaw Integration Tests
        if: env.ORCHESTRATOR == 'openclaw'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== Running OpenClaw Integration Tests ==="
          LOG_LEVEL=${{ env.LOG_LEVEL }} python -m pytest tests/test_orchestrator.py -v || echo "Tests not available, continuing with main pipeline"
          echo "Tests completed (or skipped if not available)"

      # Main AI QA Agent with OpenClaw
      - name: Run AI QA Agent with OpenClaw
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_BASE_URL: ${{ env.API_BASE_URL }}
          LOG_LEVEL: ${{ env.LOG_LEVEL }}
        run: |
          echo "=== Starting AI QA Agent Pipeline ==="
          echo "Using Orchestrator: ${{ env.ORCHESTRATOR }}"
          python -m src.main \
            --protocol "${{ env.PROTOCOL }}" \
            --spec "${{ steps.spec_arg.outputs.SPEC_ARG }}" \
            --base-url "${{ env.API_BASE_URL }}" \
            --orchestrator "${{ env.ORCHESTRATOR }}" \
            --output "${{ env.TESTS_DIR }}"
        continue-on-error: true

      # Run example to verify OpenClaw functionality
      - name: Verify OpenClaw Functionality
        if: env.ORCHESTRATOR == 'openclaw'
        run: |
          echo "=== Verifying OpenClaw Functionality ==="
          LOG_LEVEL=${{ env.LOG_LEVEL }} python examples/openclaw_examples.py 3 || echo "Examples not available"

      # Debug reports for gRPC
      - name: Debug reports folder
        if: always()
        run: |
          echo "=== Reports Directory Contents ==="
          if [ -d "${{ env.REPORTS_DIR }}" ]; then
            ls -lah ${{ env.REPORTS_DIR }}/
            echo "Files count: $(find ${{ env.REPORTS_DIR }} -type f | wc -l)"
            echo "JSON files: $(find ${{ env.REPORTS_DIR }} -name '*.json' | wc -l)"
          else
            echo "Reports directory not found"
          fi

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/${{ env.ALLURE_VERSION }}/allure-${{ env.ALLURE_VERSION }}.tgz
          tar -xzf allure-${{ env.ALLURE_VERSION }}.tgz
          echo "$(pwd)/allure-${{ env.ALLURE_VERSION }}/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        if: always()
        run: |
          echo "=== Generating Allure Report ==="
          allure generate ${{ env.REPORTS_DIR }} -o allure-report --clean || echo "Allure report generation skipped (no test data)"
        continue-on-error: true

      - name: Upload Allure Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ env.PROTOCOL }}-${{ env.ORCHESTRATOR }}
          path: allure-report
          retention-days: 30
        continue-on-error: true

      - name: Upload Test Results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ env.PROTOCOL }}-${{ env.ORCHESTRATOR }}
          path: |
            ${{ env.REPORTS_DIR }}
            ${{ env.TESTS_DIR }}
          retention-days: 30
        continue-on-error: true

      # Publish to GitHub Pages (master branch only)
      - name: Upload Allure Report as Pages Artifact
        if: github.ref == 'refs/heads/master' && always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report
        continue-on-error: true

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' && always()
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # Post-run summary
      - name: Display Pipeline Summary
        if: always()
        run: |
          echo "=== AI QA Agent Pipeline Summary ==="
          echo "Protocol: ${{ env.PROTOCOL }}"
          echo "Orchestrator: ${{ env.ORCHESTRATOR }}"
          echo "Log Level: ${{ env.LOG_LEVEL }}"
          echo "Status: ${{ job.status }}"
          echo ""
          echo "Generated Artifacts:"
          echo "  - Test Results: test-results-${{ env.PROTOCOL }}-${{ env.ORCHESTRATOR }}"
          echo "  - Allure Report: allure-report-${{ env.PROTOCOL }}-${{ env.ORCHESTRATOR }}"
          echo ""
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "GitHub Pages Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi
          echo "========================================"

  # OpenClaw-specific validation job
  validate-openclaw:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate OpenClaw integration
        run: |
          echo "=== Validating OpenClaw Integration ==="
          python << 'EOF'
from src.orchestrator.openclaw_orchestrator import OpenClawOrchestrator, TaskStatus
from src.orchestrator.workflows import get_workflow
from src.orchestrator.task_utils import TaskRetryHandler, RetryConfig

# Check orchestrator
print('✓ OpenClawOrchestrator imported successfully')

# Check workflows
for protocol in ['rest', 'graphql', 'grpc']:
    workflow = get_workflow(protocol)
    print(f'✓ {protocol.upper()} workflow loaded: {len(workflow.tasks)} tasks')

# Check retry handler
config = RetryConfig()
handler = TaskRetryHandler(config)
print(f'✓ TaskRetryHandler initialized')

print('')
print('OpenClaw integration validated successfully!')
EOF

      - name: Check documentation
        run: |
          echo "=== Checking OpenClaw Documentation ==="
          for doc in OPENCLAW_*.md; do
            if [ -f "$doc" ]; then
              lines=$(wc -l < "$doc")
              echo "✓ $doc ($lines lines)"
            fi
          done

  # Multi-protocol test job
  test-all-protocols:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        protocol: [rest, graphql, grpc]
        orchestrator: [openclaw, legacy]
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install grpcurl for gRPC
        if: matrix.protocol == 'grpc'
        run: |
          curl -L -o grpcurl.tar.gz https://github.com/fullstorydev/grpcurl/releases/download/v1.9.2/grpcurl_1.9.2_linux_amd64.tar.gz || true
          tar -xzf grpcurl.tar.gz && sudo mv grpcurl /usr/local/bin/ || echo "grpcurl installation skipped"

      - name: Set spec for protocol
        id: spec
        run: |
          case "${{ matrix.protocol }}" in
            rest) echo "SPEC_URL=examples/openapi.json" >> $GITHUB_OUTPUT ;;
            graphql) echo "SPEC_URL=https://spacex-production.up.railway.app/" >> $GITHUB_OUTPUT ;;
            grpc) echo "SPEC_URL=" >> $GITHUB_OUTPUT ;;
          esac

      - name: Set base URL for protocol
        id: url
        run: |
          case "${{ matrix.protocol }}" in
            rest) echo "BASE_URL=https://petstore.swagger.io/v2" >> $GITHUB_OUTPUT ;;
            graphql) echo "BASE_URL=https://spacex-production.up.railway.app/" >> $GITHUB_OUTPUT ;;
            grpc) echo "BASE_URL=grpcb.in:9000" >> $GITHUB_OUTPUT ;;
          esac

      - name: Test ${{ matrix.protocol }} with ${{ matrix.orchestrator }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LOG_LEVEL: INFO
        run: |
          echo "=== Testing ${{ matrix.protocol }} with ${{ matrix.orchestrator }} orchestrator ==="
          python -m src.main \
            --protocol "${{ matrix.protocol }}" \
            --spec "${{ steps.spec.outputs.SPEC_URL }}" \
            --base-url "${{ steps.url.outputs.BASE_URL }}" \
            --orchestrator "${{ matrix.orchestrator }}"
        continue-on-error: true
      
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.protocol }}-${{ matrix.orchestrator }}
          path: |
            reports/
            generated_tests/
          retention-days: 14
        continue-on-error: true