name: AI QA Agent Pipeline

on:
  workflow_dispatch:
    inputs:
      protocol:
        description: 'Protocol (rest, graphql, grpc)'
        required: false
        default: 'rest'
      spec_url:
        description: 'OpenAPI spec URL or GraphQL endpoint (ignored for gRPC)'
        required: false
        default: ''
      api_base_url:
        description: 'Base URL for API (REST/GraphQL) or server address (gRPC: host:port)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PROTOCOL: ${{ github.event.inputs.protocol || 'rest' }}
  SPEC_URL: ${{ github.event.inputs.spec_url || 'examples/openapi.json' }}
  API_BASE_URL: ${{ github.event.inputs.api_base_url || secrets.API_BASE_URL || '' }}
  REPORTS_DIR: reports
  TESTS_DIR: generated_tests
  ALLURE_VERSION: 2.33.0

jobs:
  run-ai-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Устанавливаем grpcurl только для gRPC протокола
      - name: Install grpcurl
        if: env.PROTOCOL == 'grpc'
        run: |
          set -e
          # Пробуем скачать предварительно собранный бинарник
          curl -L -o grpcurl.tar.gz https://github.com/fullstorydev/grpcurl/releases/download/v1.9.2/grpcurl_1.9.2_linux_amd64.tar.gz || true
          if file grpcurl.tar.gz | grep -q 'gzip compressed data'; then
            tar -xzf grpcurl.tar.gz
            sudo mv grpcurl /usr/local/bin/
          else
            echo "Binary download failed, falling back to go install"
            go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest
            echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          fi

      # Определяем аргумент spec: для gRPC передаём пустую строку, иначе SPEC_URL
      - name: Set spec argument
        id: spec_arg
        run: |
          if [ "${{ env.PROTOCOL }}" = "grpc" ]; then
            echo "SPEC_ARG=" >> $GITHUB_OUTPUT
          else
            echo "SPEC_ARG=${{ env.SPEC_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Run AI QA Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_BASE_URL: ${{ env.API_BASE_URL }}
        run: |
          python -m src.main \
            --protocol "${{ env.PROTOCOL }}" \
            --spec "${{ steps.spec_arg.outputs.SPEC_ARG }}" \
            --base-url "${{ env.API_BASE_URL }}"

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/${{ env.ALLURE_VERSION }}/allure-${{ env.ALLURE_VERSION }}.tgz
          tar -xzf allure-${{ env.ALLURE_VERSION }}.tgz
          echo "$(pwd)/allure-${{ env.ALLURE_VERSION }}/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate ${{ env.REPORTS_DIR }} -o allure-report --clean
        continue-on-error: true

      - name: Upload Allure Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14

      - name: Upload Test Results (raw) as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ${{ env.REPORTS_DIR }}
            ${{ env.TESTS_DIR }}
          retention-days: 14

      # Публикация на GitHub Pages (только для ветки master)
      - name: Upload Allure Report as Pages Artifact
        if: github.ref == 'refs/heads/master' && always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' && always()
        uses: actions/deploy-pages@v4

      - name: Display test summary
        if: always()
        run: |
          echo "Pipeline finished for protocol: ${{ env.PROTOCOL }}"
          echo "Check artifacts for Allure report and test results."
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "Allure report will be available at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi